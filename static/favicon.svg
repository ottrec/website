<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Site icon: a serif "o" (the wordmark face, Source Serif 4 bold) over a pair
    of recreation waves, flexoki colors (cream paper tile base-50 to base-100,
    black ink letter, blue-600 to cyan-600 waves). The glyph is the real Source
    Serif 4 "o" outline at wght 700 (extracted from fonts/source_serif_4.woff2
    with fontTools) so it matches the ottrec.ca wordmark.

    Regenerate the derived icons (ImageMagick 7) from website/static/:

      magick -background none favicon.svg \
        ( -clone 0 -resize 16x16 ) ( -clone 0 -resize 32x32 ) ( -clone 0 -resize 48x48 ) \
        -delete 0 favicon.ico

      sed 's/ rx="14"//' favicon.svg | \
        magick -background none -density 288 svg:- -resize 180x180 -depth 8 apple-touch-icon.png

    The apple-touch-icon is full-bleed (rounded tile corners stripped) since
    iOS applies its own corner mask.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFCF0"/>
      <stop offset="1" stop-color="#E6E4D9"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#205EA6"/>
      <stop offset="1" stop-color="#24837B"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
