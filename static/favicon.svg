<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Site icon: a calendar with a wave (recreation schedules), flexoki colors
    (blue-400 to blue-800 tile, cyan-300 to cyan-600 header band, blue-600
    wave on paper).

    Regenerate the derived icons (ImageMagick 7) from website/static/:

      magick -background none favicon.svg \
        ( -clone 0 -resize 16x16 ) ( -clone 0 -resize 32x32 ) ( -clone 0 -resize 48x48 ) \
        -delete 0 favicon.ico

      sed 's/ rx="14"//' favicon.svg | \
        magick -background none -density 288 svg:- -resize 180x180 -depth 8 apple-touch-icon.png

    The apple-touch-icon is full-bleed (rounded tile corners stripped) since
    iOS applies its own corner mask.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4385BE"/>
      <stop offset="1" stop-color="#163B66"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ABDAC"/>
      <stop offset="1" stop-color="#24837B"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="10" y="12" width="44" height="42" rx="7" fill="#FFFCF0"/>
  <path d="M10 19 a7 7 0 0 1 7-7 h30 a7 7 0 0 1 7 7 v6 H10 Z" fill="url(#band)"/>
  <path d="M17 41 C22 34 27 48 32 41 C37 34 42 48 47 41" fill="none" stroke="#205EA6" stroke-width="6" stroke-linecap="round"/>
</svg>
